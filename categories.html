<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Categories</title>

<style>
/* ================= BASE ================= */
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:'Georgia','Times New Roman',serif;
  background:#f7f1e6;
  color:#3e362b;
  font-size:14px;
}

/* ================= HEADER ================= */
header{
  background:#f2e9da;
  padding:20px 32px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:sticky;top:0;z-index:100;
  border-bottom:1px solid #e8dcc4;
}
.header-left{ display:flex;gap:14px;align-items:center; }
header h3{ font-weight:400;letter-spacing:2.5px;font-size:16px;text-transform:uppercase;color:#3e362b;margin:0; }
.header-right{ display:flex;gap:22px;align-items:center;font-size:12.5px;letter-spacing:0.4px;font-family:'Segoe UI',Arial,sans-serif; }
#clock{ opacity:0.55;color:#9c8f78; }
.logout-btn{ background:transparent;border:1px solid #d4c4a0;color:#b08d57;padding:6px 16px;cursor:pointer;font-size:11px;letter-spacing:1.2px;text-transform:uppercase;font-family:'Segoe UI',Arial,sans-serif;transition:0.25s; }
.logout-btn:hover{ background:#b08d57;border-color:#b08d57;color:#fff9f0; }

/* ================= LAYOUT ================= */
.container{ display:flex;min-height:calc(100vh - 76px);position:relative;background:#f2e9da; }

/* ================= SIDEBAR ================= */
.sidebar{ width:230px;background:#f2e9da;color:#8a7c63;padding:28px 0;transition:0.25s;flex-shrink:0;border-right:1px solid #ece2cc;font-family:'Segoe UI',Arial,sans-serif; }
.sidebar.hide{ width:0;padding:0;overflow:hidden; }
.sidebar div{ padding:13px 28px;margin:0;background:transparent;cursor:pointer;font-size:12px;letter-spacing:1.2px;text-transform:uppercase;border-left:2px solid transparent;transition:0.2s; }
.sidebar div:hover{ background:#e8dcc0;color:#9c6b3f; }
.sidebar div.active{ background:#e8dcc0;border-left-color:#9c6b3f;color:#9c6b3f; }
.overlay{ display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:90; }
.overlay.show{ display:block; }

/* ================= CONTENT ================= */
.content{ flex:1;padding:36px 40px;min-width:0; }
.content > h2{ margin:0 0 6px 0;font-size:19px;font-weight:400;color:#3e362b;letter-spacing:1px;font-family:'Georgia',serif; }
.content > .subtitle{ font-size:12px;color:#a89a7d;letter-spacing:0.3px;font-family:'Segoe UI',Arial,sans-serif;margin-bottom:28px; }

/* ================= STATS BAR ================= */
.stats-bar{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:1px;
  background:#ece2cc;
  border:1px solid #ece2cc;
  margin-bottom:24px;
}
.stat-cell{ background:#ffffff;padding:14px 18px;display:flex;flex-direction:column;gap:4px; }
.stat-cell .s-label{ font-size:10px;color:#b08d57;text-transform:uppercase;letter-spacing:1px;font-family:'Segoe UI',Arial,sans-serif; }
.stat-cell .s-val{ font-size:20px;font-weight:400;color:#3e362b;font-family:'Georgia',serif; }

/* ================= TOOLBAR ================= */
.toolbar{ display:flex;justify-content:space-between;align-items:center;gap:14px;margin-bottom:16px;flex-wrap:wrap; }
.toolbar-left{ display:flex;gap:10px;align-items:center;flex-wrap:wrap; }
.toolbar-right{ display:flex;gap:10px;align-items:center; }

.search-wrap{ position:relative; }
.search-wrap input{
  width:260px;padding:10px 14px 10px 36px;
  border:1px solid #e3d6b8;background:#ffffff;
  color:#3e362b;font-family:'Segoe UI',Arial,sans-serif;font-size:13px;
  outline:none;transition:border-color 0.2s;
}
.search-wrap input:focus{ border-color:#b08d57; }
.search-wrap::before{ content:'⌕';position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#b08d57;font-size:16px;pointer-events:none; }

.sort-select{ padding:9px 12px;border:1px solid #e3d6b8;background:#ffffff;color:#7a6a50;font-family:'Segoe UI',Arial,sans-serif;font-size:11.5px;letter-spacing:0.4px;outline:none;cursor:pointer; }
.sort-select:focus{ border-color:#b08d57; }

.btn-add{ padding:10px 20px;background:#b08d57;border:1px solid #b08d57;color:#ffffff;cursor:pointer;font-family:'Segoe UI',Arial,sans-serif;font-size:11.5px;letter-spacing:1px;text-transform:uppercase;transition:0.2s;white-space:nowrap; }
.btn-add:hover{ background:#9c7a46;border-color:#9c7a46; }

/* ================= BULK BAR ================= */
.bulk-bar{ display:none;align-items:center;gap:14px;padding:12px 16px;background:#3e362b;color:#f2e9da;font-family:'Segoe UI',Arial,sans-serif;font-size:12.5px;letter-spacing:0.3px;margin-bottom:4px;justify-content:space-between; }
.bulk-bar.show{ display:flex; }
.bulk-bar button{ padding:6px 14px;font-size:11px;letter-spacing:0.8px;border:1px solid rgba(255,255,255,0.25);color:#f2e9da;background:transparent; }
.bulk-bar button:hover{ background:rgba(255,255,255,0.1); }
.bulk-bar .bulk-del{ border-color:#c87a7a;color:#f0b0a0; }
.bulk-bar .bulk-del:hover{ background:#9a3a2a;border-color:#9a3a2a;color:#fff; }

/* ================= TABLE ================= */
.table-wrap{ background:#ffffff;border-top:2px solid #d9c9a3;overflow-x:auto; }
table{ width:100%;background:transparent;border-collapse:collapse;font-family:'Segoe UI',Arial,sans-serif; }
th,td{ padding:13px 16px;border-bottom:1px solid #f2ebe0;text-align:left; }
th{ color:#a89a7d;font-weight:400;font-size:10.5px;text-transform:uppercase;letter-spacing:0.8px;cursor:pointer;user-select:none;white-space:nowrap; }
th:hover{ color:#7a6a50; }
th .sort-icon{ margin-left:4px;opacity:0.5;font-style:normal; }
th.sorted .sort-icon{ opacity:1;color:#b08d57; }
td{ color:#4a4133;font-size:13.5px; }
tbody tr{ transition:background 0.12s; }
tbody tr:hover td{ background:#faf5ea; }
tbody tr.selected td{ background:#fdf7ec; }

th.check-col, td.check-col{ width:40px;padding-right:0; }
input[type="checkbox"]{ width:15px;height:15px;accent-color:#b08d57;cursor:pointer; }

/* CATEGORY NUMBER */
.cat-index{ color:#c9bc9e;font-size:11.5px;font-weight:400; }

/* PRODUCT COUNT PILL */
.prod-pill{
  display:inline-block;padding:3px 10px;
  font-size:11.5px;border-radius:2px;
  background:#f2e9da;color:#8a7260;
  border:1px solid #e3d6b8;
}
.prod-pill.has-prod{ background:#eef5ec;color:#5a7a52;border-color:#c0d8b8; }
.prod-pill.no-prod{ background:#faf5ea;color:#b0a080; }

/* ACTION BUTTONS */
.actions{ display:flex;gap:6px;align-items:center; }
.icon-btn{ padding:6px 10px;font-size:13px;border:1px solid transparent;background:transparent;cursor:pointer;transition:0.15s;letter-spacing:0;text-transform:none;color:#a89a7d; }
.icon-btn:hover{ border-color:#e3d6b8;background:#f7f1e6;color:#3e362b; }
.icon-btn.del-btn:hover{ border-color:#d4a0a0;background:#fdecea;color:#9a3a2a; }

.product-count{ color:#a89a7d;font-size:11.5px;letter-spacing:0.4px;font-family:'Segoe UI',Arial,sans-serif;white-space:nowrap; }
.empty-row td{ text-align:center;color:#a89a7d;padding:46px;font-size:13px; }

/* ================= MODAL ================= */
.modal-bg{ display:none;position:fixed;inset:0;background:rgba(62,54,43,0.4);z-index:200;justify-content:center;align-items:center;backdrop-filter:blur(2px); }
.modal-bg.show{ display:flex; }
.modal{ background:#ffffff;width:100%;max-width:440px;border-top:3px solid #b08d57;padding:32px 36px;position:relative;box-shadow:0 16px 48px rgba(62,54,43,0.18);animation:modalIn 0.2s ease; }
@keyframes modalIn{ from{transform:translateY(16px);opacity:0;} to{transform:translateY(0);opacity:1;} }
.modal h3{ margin:0 0 24px 0;font-size:11px;color:#b08d57;text-transform:uppercase;letter-spacing:1.6px;font-weight:400;font-family:'Segoe UI',Arial,sans-serif; }
.modal-close{ position:absolute;top:16px;right:20px;font-size:20px;color:#c9bc9e;cursor:pointer;background:none;border:none;padding:4px 8px;letter-spacing:0;text-transform:none; }
.modal-close:hover{ color:#3e362b;background:transparent; }
.modal .field{ margin-bottom:16px; }
.modal .field label{ display:block;font-size:10.5px;color:#a89a7d;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px;font-family:'Segoe UI',Arial,sans-serif; }
.modal .field input{ width:100%;padding:11px 12px;border:1px solid #e3d6b8;background:#f7f1e6;color:#3e362b;font-family:'Segoe UI',Arial,sans-serif;font-size:13.5px;outline:none;transition:border-color 0.2s; }
.modal .field input:focus{ border-color:#b08d57;background:#ffffff; }
.modal .field input::placeholder{ color:#bfb194; }
.modal .field .hint{ font-size:11px;color:#b0a080;margin-top:5px;font-family:'Segoe UI',Arial,sans-serif;letter-spacing:0.2px; }
.modal-error{ font-size:12px;color:#b06a5a;margin-top:-8px;margin-bottom:8px;font-family:'Segoe UI',Arial,sans-serif;min-height:16px; }
.modal-actions{ display:flex;gap:10px;margin-top:24px;justify-content:flex-end; }
.modal-actions button{ padding:10px 24px;font-size:11.5px;letter-spacing:1px;text-transform:uppercase;font-family:'Segoe UI',Arial,sans-serif; }
.btn-cancel{ border:1px solid #e3d6b8;color:#a89a7d;background:transparent; }
.btn-cancel:hover{ background:#f7f1e6; }
.btn-save{ border:1px solid #b08d57;color:#b08d57;background:transparent; }
.btn-save:hover{ background:#b08d57;color:#ffffff; }

/* ================= TOAST ================= */
.toast{ position:fixed;bottom:28px;right:28px;background:#3e362b;color:#f7f1e6;padding:12px 22px;font-family:'Segoe UI',Arial,sans-serif;font-size:13px;letter-spacing:0.3px;opacity:0;transform:translateY(10px);transition:all 0.3s ease;pointer-events:none;z-index:999;border-left:3px solid #b08d57; }
.toast.show{ opacity:1;transform:translateY(0); }
.toast.success{ border-left-color:#7a9b6e; }
.toast.error{ border-left-color:#b06a5a; }

/* ================= RESPONSIVE ================= */
@media(max-width:768px){
  .sidebar{ position:fixed;top:65px;left:0;bottom:0;z-index:95;width:230px;transform:translateX(-100%); }
  .sidebar:not(.hide){ transform:translateX(0); }
  .sidebar.hide{ width:230px;padding:28px 0;transform:translateX(-100%); }
  #clock{ display:none; }
  .content{ padding:20px 16px; }
  .toolbar{ flex-direction:column;align-items:flex-start; }
  .search-wrap input{ width:100%; }
  .stats-bar{ grid-template-columns:1fr 1fr; }
}
</style>
</head>

<body>

<!-- HEADER -->
<header>
  <div class="header-left">
    <div onclick="toggleSidebar()" style="cursor:pointer;font-size:20px;color:#b08d57;">☰</div>
    <h3>Categories</h3>
  </div>
  <div class="header-right">
    <span id="clock"></span>
    <span>User: <span id="user" style="color:#b08d57;"></span></span>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</header>

<div class="container">
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<!-- SIDEBAR -->
<div class="sidebar hide" id="sidebar">
  <div onclick="go('index')" data-page="index">Dashboard</div>
  <div onclick="go('products')" data-page="products">Products</div>
  <div onclick="go('categories')" data-page="categories">Categories</div>
  <div onclick="go('stock')" data-page="stock">Stock</div>
  <div onclick="go('reports')" data-page="reports">Reports</div>
  <div onclick="go('settings')" data-page="settings">Settings</div>
</div>

<!-- CONTENT -->
<div class="content">

  <h2>Category Management</h2>
  <p class="subtitle" id="lastUpdated">—</p>

  <!-- STATS BAR -->
  <div class="stats-bar">
    <div class="stat-cell">
      <span class="s-label">Total Kategori</span>
      <span class="s-val" id="statTotal">0</span>
    </div>
    <div class="stat-cell">
      <span class="s-label">Ada Produk</span>
      <span class="s-val" id="statUsed">0</span>
    </div>
    <div class="stat-cell">
      <span class="s-label">Tiada Produk</span>
      <span class="s-val" id="statEmpty">0</span>
    </div>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="toolbar-left">
      <div class="search-wrap">
        <input id="search" oninput="render()" placeholder="Cari kategori...">
      </div>
      <select class="sort-select" id="sortSelect" onchange="render()">
        <option value="default">Susunan Asal</option>
        <option value="name_asc">Nama A–Z</option>
        <option value="name_desc">Nama Z–A</option>
        <option value="most">Paling Banyak Produk</option>
        <option value="least">Paling Sedikit Produk</option>
      </select>
    </div>
    <div class="toolbar-right">
      <button class="btn-add" onclick="openModal()">+ Tambah Kategori</button>
    </div>
  </div>

  <!-- BULK BAR -->
  <div class="bulk-bar" id="bulkBar">
    <span id="bulkCount">0 dipilih</span>
    <div style="display:flex;gap:8px;">
      <button onclick="bulkDelete()" class="bulk-del">Padam Dipilih</button>
      <button onclick="clearSelection()">Batal</button>
    </div>
  </div>

  <!-- TABLE -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th class="check-col"><input type="checkbox" id="selectAll" onchange="toggleSelectAll(this)"></th>
          <th onclick="cycleSortCol('name')">#  Nama <i class="sort-icon" id="si-name"></i></th>
          <th onclick="cycleSortCol('prodCount')">Produk <i class="sort-icon" id="si-prodCount"></i></th>
          <th>Tindakan</th>
        </tr>
      </thead>
      <tbody id="list"></tbody>
    </table>
  </div>

  <div style="margin-top:10px;display:flex;justify-content:space-between;align-items:center;">
    <span class="product-count" id="catCount">0 kategori</span>
    <div id="pagination" style="display:flex;gap:6px;"></div>
  </div>

</div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modalBg" onclick="closeModalBg(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h3 id="modalTitle">Tambah Kategori Baru</h3>

    <div class="field">
      <label>Nama Kategori</label>
      <input id="m-name" placeholder="contoh: Minuman, Snek, Barangan Dapur">
      <div class="hint">Nama kategori mestilah unik.</div>
    </div>

    <div class="modal-error" id="modalError"></div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Batal</button>
      <button class="btn-save" id="modalSaveBtn" onclick="saveModal()">Tambah</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
/* ================= INIT ================= */
if(localStorage.getItem("loggedIn") !== "true"){
  window.location.href = "login.html";
}

let categories = [];
try{ categories = JSON.parse(localStorage.getItem("categories")) || []; }
catch(e){ categories = []; }

let products = [];
try{ products = JSON.parse(localStorage.getItem("products")) || []; }
catch(e){ products = []; }

let editIndex = -1;
let selectedIndexes = new Set();
const PAGE_SIZE = 15;
let currentPage = 1;
let sortCol = null, sortDir = 1;

/* ================= SAVE ================= */
function save(){
  localStorage.setItem("categories", JSON.stringify(categories));
  updateStats();
}

/* ================= TOAST ================= */
function toast(msg, type="success"){
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = "toast show " + type;
  clearTimeout(el._t);
  el._t = setTimeout(()=>el.classList.remove("show"), 2600);
}

/* ================= PRODUCT COUNT PER CATEGORY ================= */
function getProductCount(catName){
  return products.filter(p => (p.category||"") === catName).length;
}

/* ================= STATS ================= */
function updateStats(){
  const total = categories.length;
  let used = 0, empty = 0;
  categories.forEach(c=>{
    getProductCount(c.name) > 0 ? used++ : empty++;
  });
  document.getElementById("statTotal").textContent = total;
  document.getElementById("statUsed").textContent = used;
  document.getElementById("statEmpty").textContent = empty;

  const now = new Date();
  document.getElementById("lastUpdated").textContent =
    "Dikemaskini " + now.toLocaleString('ms-MY',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
}

/* ================= SORT ================= */
function cycleSortCol(col){
  if(sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = 1; }
  document.getElementById("sortSelect").value = "default";
  render();
  updateSortIcons();
}

function updateSortIcons(){
  ["name","prodCount"].forEach(c=>{
    const el = document.getElementById("si-"+c);
    if(!el) return;
    el.closest("th").classList.toggle("sorted", sortCol===c);
    el.textContent = sortCol===c ? (sortDir===1 ? " ↑" : " ↓") : "";
  });
}

function getSorted(arr){
  const sel = document.getElementById("sortSelect").value;
  let a = arr.map(c=>({...c, _count: getProductCount(c.name)}));

  if(sortCol === "name") return a.sort((x,y)=>x.name.localeCompare(y.name)*sortDir);
  if(sortCol === "prodCount") return a.sort((x,y)=>(x._count - y._count)*sortDir);

  switch(sel){
    case "name_asc":  return a.sort((x,y)=>x.name.localeCompare(y.name));
    case "name_desc": return a.sort((x,y)=>y.name.localeCompare(x.name));
    case "most":      return a.sort((x,y)=>y._count - x._count);
    case "least":     return a.sort((x,y)=>x._count - y._count);
    default: return a;
  }
}

/* ================= RENDER ================= */
function render(){
  const keyword = document.getElementById("search").value.toLowerCase().trim();
  let filtered = categories.filter(c => c.name.toLowerCase().includes(keyword));
  const sorted = getSorted(filtered);

  const totalPages = Math.max(1, Math.ceil(sorted.length / PAGE_SIZE));
  if(currentPage > totalPages) currentPage = totalPages;
  const pageItems = sorted.slice((currentPage-1)*PAGE_SIZE, currentPage*PAGE_SIZE);

  document.getElementById("catCount").textContent =
    filtered.length + " kategori" + (filtered.length !== categories.length ? " (ditapis)" : "");

  renderPagination(totalPages);
  updateStats();

  const list = document.getElementById("list");
  if(!pageItems.length){
    list.innerHTML = `<tr class="empty-row"><td colspan="4">Tiada kategori dijumpai.</td></tr>`;
    return;
  }

  list.innerHTML = pageItems.map((c, idx)=>{
    const i = categories.findIndex(x=>x.name===c.name);
    const isSelected = selectedIndexes.has(i);
    const count = c._count;
    const rowNum = (currentPage-1)*PAGE_SIZE + idx + 1;
    const pillClass = count > 0 ? "has-prod" : "no-prod";
    const pillLabel = count > 0 ? count + " produk" : "Tiada produk";

    return `
    <tr class="${isSelected ? 'selected' : ''}" id="row-${i}">
      <td class="check-col">
        <input type="checkbox" ${isSelected ? "checked":""} onchange="toggleSelect(${i},this)">
      </td>
      <td>
        <span class="cat-index">${String(rowNum).padStart(2,"0")} &nbsp;</span>
        <strong style="font-weight:500;">${c.name}</strong>
      </td>
      <td><span class="prod-pill ${pillClass}">${pillLabel}</span></td>
      <td>
        <div class="actions">
          <button class="icon-btn" onclick="openEditModal(${i})" title="Edit">✎</button>
          <button class="icon-btn del-btn" onclick="del(${i})" title="Padam">✕</button>
        </div>
      </td>
    </tr>`;
  }).join("");

  syncSelectAll();
}

/* ================= PAGINATION ================= */
function renderPagination(total){
  const pg = document.getElementById("pagination");
  if(total <= 1){ pg.innerHTML=""; return; }
  pg.innerHTML = Array.from({length:total},(_,i)=>i+1).map(n=>`
    <button onclick="goPage(${n})" style="padding:6px 12px;font-size:11.5px;letter-spacing:0;
      ${n===currentPage?"background:#3e362b;color:#f2e9da;border-color:#3e362b;":"background:#fff;color:#a89a7d;border-color:#e3d6b8;"}">${n}</button>
  `).join("");
}
function goPage(n){ currentPage=n; render(); window.scrollTo(0,0); }

/* ================= SELECTION ================= */
function toggleSelect(i, cb){
  cb.checked ? selectedIndexes.add(i) : selectedIndexes.delete(i);
  updateBulkBar();
  const row = document.getElementById("row-"+i);
  if(row) row.classList.toggle("selected", cb.checked);
}
function toggleSelectAll(masterCb){
  document.querySelectorAll("#list tr:not(.empty-row)").forEach(row=>{
    const cb = row.querySelector("input[type=checkbox]");
    const idx = parseInt(row.id.replace("row-",""));
    if(cb) cb.checked = masterCb.checked;
    masterCb.checked ? selectedIndexes.add(idx) : selectedIndexes.delete(idx);
    row.classList.toggle("selected", masterCb.checked);
  });
  updateBulkBar();
}
function syncSelectAll(){
  const rows = document.querySelectorAll("#list tr:not(.empty-row)");
  const master = document.getElementById("selectAll");
  if(master) master.checked = rows.length > 0 && [...rows].every(r=>r.classList.contains("selected"));
}
function updateBulkBar(){
  const count = selectedIndexes.size;
  document.getElementById("bulkBar").classList.toggle("show", count > 0);
  document.getElementById("bulkCount").textContent = count + " item dipilih";
}
function clearSelection(){
  selectedIndexes.clear();
  updateBulkBar();
  render();
}
function bulkDelete(){
  if(!selectedIndexes.size) return;
  const affected = [...selectedIndexes].map(i=>getProductCount(categories[i]?.name||"")).reduce((a,b)=>a+b,0);
  let msg = `Padam ${selectedIndexes.size} kategori?`;
  if(affected > 0) msg += `\n\nAmaran: ${affected} produk akan kehilangan kategorinya.`;
  if(!confirm(msg)) return;

  const sorted = [...selectedIndexes].sort((a,b)=>b-a);
  sorted.forEach(i=>{
    // buang kategori dari produk
    const name = categories[i]?.name;
    if(name) products.forEach(p=>{ if(p.category===name) p.category=""; });
    categories.splice(i,1);
  });
  localStorage.setItem("products", JSON.stringify(products));
  selectedIndexes.clear();
  save(); render();
  toast(`${sorted.length} kategori dipadam.`, "error");
}

/* ================= DELETE ================= */
function del(i){
  const name = categories[i].name;
  const count = getProductCount(name);
  let msg = `Padam kategori "${name}"?`;
  if(count > 0) msg += `\n\n${count} produk akan kehilangan kategori ini.`;
  if(!confirm(msg)) return;

  products.forEach(p=>{ if(p.category===name) p.category=""; });
  categories.splice(i,1);
  localStorage.setItem("products", JSON.stringify(products));
  selectedIndexes.delete(i);
  save(); render();
  toast(`"${name}" dipadam.`, "error");
}

/* ================= MODAL ================= */
function openModal(){
  editIndex = -1;
  document.getElementById("modalTitle").textContent = "Tambah Kategori Baru";
  document.getElementById("modalSaveBtn").textContent = "Tambah";
  document.getElementById("m-name").value = "";
  document.getElementById("modalError").textContent = "";
  document.getElementById("modalBg").classList.add("show");
  setTimeout(()=>document.getElementById("m-name").focus(), 100);
}
function openEditModal(i){
  editIndex = i;
  document.getElementById("modalTitle").textContent = "Edit Kategori";
  document.getElementById("modalSaveBtn").textContent = "Simpan";
  document.getElementById("m-name").value = categories[i].name;
  document.getElementById("modalError").textContent = "";
  document.getElementById("modalBg").classList.add("show");
  setTimeout(()=>document.getElementById("m-name").focus(), 100);
}
function closeModal(){ document.getElementById("modalBg").classList.remove("show"); }
function closeModalBg(e){ if(e.target===document.getElementById("modalBg")) closeModal(); }

function saveModal(){
  const name = document.getElementById("m-name").value.trim();
  const err = document.getElementById("modalError");

  if(!name){ err.textContent = "Nama kategori diperlukan."; return; }

  const duplicate = categories.some((c,i)=>
    c.name.toLowerCase() === name.toLowerCase() && i !== editIndex
  );
  if(duplicate){ err.textContent = "Kategori ini sudah wujud."; return; }

  if(editIndex === -1){
    categories.push({name});
    save(); closeModal(); render();
    toast(`"${name}" berjaya ditambah.`);
  } else {
    const oldName = categories[editIndex].name;
    // update nama dalam produk juga
    products.forEach(p=>{ if(p.category===oldName) p.category=name; });
    localStorage.setItem("products", JSON.stringify(products));
    categories[editIndex] = {name};
    save(); closeModal(); render();
    toast(`"${oldName}" ditukar kepada "${name}".`);
  }
}

/* ================= NAV ================= */
function toggleSidebar(){
  const s=document.getElementById("sidebar"), o=document.getElementById("overlay");
  s.classList.toggle("hide");
  o.classList.toggle("show", !s.classList.contains("hide") && window.innerWidth<=768);
}
function go(p){ location.href=p+".html"; }
function setActiveMenu(){
  const cur=(location.pathname.split("/").pop()||"index.html").replace(".html","");
  document.querySelectorAll(".sidebar div").forEach(d=>d.classList.toggle("active",d.dataset.page===cur));
}
function loadUser(){ document.getElementById("user").textContent=localStorage.getItem("username")||"User"; }
function logout(){
  if(confirm("Adakah anda pasti mahu log keluar?")){
    localStorage.removeItem("loggedIn");
    window.location.href="login.html";
  }
}
function updateClock(){
  const now=new Date();
  document.getElementById("clock").textContent=
    now.toLocaleDateString('ms-MY',{weekday:'short',day:'2-digit',month:'short',year:'numeric'})+", "+
    now.toLocaleTimeString('ms-MY',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

document.addEventListener("keydown",e=>{
  if(e.key==="Escape") closeModal();
  if((e.ctrlKey||e.metaKey)&&e.key==="f"){ e.preventDefault(); document.getElementById("search").focus(); }
});

window.onload=function(){
  loadUser(); setActiveMenu();
  updateClock(); setInterval(updateClock,1000);
  render();
};
window.addEventListener("resize",()=>{
  if(window.innerWidth>768) document.getElementById("overlay").classList.remove("show");
});
</script>
