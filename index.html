<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard POS</title>

<style>
/* ================= BASE ================= */
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:'Georgia', 'Times New Roman', serif;
  background:#f7f1e6;
  color:#3e362b;
  font-size:14px;
}

@font-face {
  font-family: 'sans-ui';
}

/* ================= HEADER ================= */
header{
  background:#f2e9da;
  color:#b08d57;
  padding:20px 32px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:sticky;
  top:0;
  z-index:100;
  border-bottom:1px solid #e8dcc4;
}

header h3{
  font-weight:400;
  letter-spacing:2.5px;
  font-size:16px;
  text-transform:uppercase;
  color:#3e362b;
}

.header-left{
  display:flex;
  gap:14px;
  align-items:center;
}

.header-right{
  display:flex;
  gap:22px;
  align-items:center;
  font-size:12.5px;
  letter-spacing:0.4px;
}

#clock{
  opacity:0.55;
  color:#9c8f78;
}

.logout-btn{
  background:transparent;
  border:1px solid #d4c4a0;
  color:#b08d57;
  padding:6px 16px;
  border-radius:0;
  cursor:pointer;
  font-size:11px;
  letter-spacing:1.2px;
  text-transform:uppercase;
  font-family:'Segoe UI', Arial, sans-serif;
  transition:0.25s;
}

.logout-btn:hover{
  background:#b08d57;
  border-color:#b08d57;
  color:#fff9f0;
}

/* ================= LAYOUT ================= */
.container{
  display:flex;
  min-height:calc(100vh - 76px);
  position:relative;
  background:#f2e9da;
}

/* ================= SIDEBAR ================= */
.sidebar{
  width:230px;
  background:#f2e9da;
  color:#8a7c63;
  padding:28px 0;
  transition:0.25s;
  flex-shrink:0;
  border-right:1px solid #ece2cc;
  font-family:'Segoe UI', Arial, sans-serif;
}

.sidebar.hide{
  width:0;
  padding:0;
  overflow:hidden;
}

.sidebar div{
  padding:13px 28px;
  margin:0;
  background:transparent;
  cursor:pointer;
  font-size:12px;
  letter-spacing:1.2px;
  text-transform:uppercase;
  border-left:2px solid transparent;
  transition:0.2s;
}

.sidebar div:hover{
  background:#e8dcc0;
  color:#9c6b3f;
}

.sidebar div.active{
  background:#e8dcc0;
  border-left-color:#9c6b3f;
  color:#9c6b3f;
}

/* overlay untuk mobile */
.overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  z-index:90;
}

.overlay.show{
  display:block;
}

/* ================= CONTENT ================= */
.content{
  flex:1;
  padding:36px 40px;
  min-width:0;
}

/* ================= GRID ================= */
.dashboard-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
  gap:1px;
  margin-bottom:36px;
  background:#ece2cc;
  border:1px solid #ece2cc;
}

/* ================= CARD ================= */
.card{
  background:#ffffff;
  padding:26px 24px;
  border-radius:0;
  border:none;
  box-shadow:0 2px 10px rgba(176,141,87,0.08);
  transition:0.25s;
  border-top:2px solid #d9c9a3;
}

.card:hover{
  background:#faf5ea;
  border-top-color:#b08d57;
}

.card.warning{ border-top-color:#c19a55; }
.card.danger{ border-top-color:#b06a5a; }
.card.success{ border-top-color:#7a9b6e; }

.card h2{
  margin:0;
  font-size:11px;
  color:#a89a7d;
  text-transform:uppercase;
  letter-spacing:1.6px;
  font-weight:400;
  font-family:'Segoe UI', Arial, sans-serif;
}

.card p{
  font-size:30px;
  font-weight:400;
  margin-top:14px;
  color:#3e362b;
  font-family:'Georgia', serif;
}

/* ================= RECENT ACTIVITY ================= */
.panel{
  background:#ffffff;
  border-radius:0;
  border:none;
  border-top:2px solid #d9c9a3;
  padding:26px 28px;
  box-shadow:0 2px 10px rgba(176,141,87,0.08);
}

.panel h3{
  margin-top:0;
  margin-bottom:18px;
  font-size:11px;
  color:#a89a7d;
  text-transform:uppercase;
  letter-spacing:1.6px;
  font-weight:400;
  font-family:'Segoe UI', Arial, sans-serif;
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:13.5px;
}

th, td{
  text-align:left;
  padding:12px 10px;
  border-bottom:1px solid #ece2cc;
}

th{
  color:#a89a7d;
  font-weight:400;
  font-size:10.5px;
  text-transform:uppercase;
  letter-spacing:0.8px;
  font-family:'Segoe UI', Arial, sans-serif;
}

td{
  color:#4a4133;
}

tr:hover td{
  color:#b08d57;
}

.empty-state{
  text-align:center;
  color:#a89a7d;
  padding:34px;
  font-size:13px;
  font-family:'Segoe UI', Arial, sans-serif;
}

/* ================= RESPONSIVE ================= */
@media (max-width:768px){
  .sidebar{
    position:fixed;
    top:56px;
    left:0;
    bottom:0;
    z-index:95;
    width:220px;
    transform:translateX(-100%);
  }
  .sidebar:not(.hide){
    transform:translateX(0);
  }
  .sidebar.hide{
    width:220px;
    padding:20px;
    transform:translateX(-100%);
  }
  #clock{ display:none; }
}
</style>

</head>

<body>

<!-- ================= HEADER ================= -->
<header>
  <div class="header-left">
    <div onclick="toggleSidebar()" style="cursor:pointer;font-size:20px;color:#b08d57;">☰</div>
    <h3 style="margin:0;">Dashboard</h3>
  </div>

  <div class="header-right">
    <span id="clock"></span>
    <span style="font-family:'Segoe UI', Arial, sans-serif;">User: <span id="user" style="color:#b08d57;"></span></span>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</header>

<!-- ================= LAYOUT ================= -->
<div class="container">

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<!-- SIDEBAR -->
<div class="sidebar hide" id="sidebar">

  <div onclick="go('index')" data-page="index">Dashboard</div>
  <div onclick="go('products')" data-page="products">Products</div>
  <div onclick="go('categories')" data-page="categories">Categories</div>
  <div onclick="go('stock')" data-page="stock">Stock</div>
  <div onclick="go('reports')" data-page="reports">Reports</div>
  <div onclick="go('settings')" data-page="settings">Settings</div>

</div>

<!-- CONTENT -->
<div class="content">

  <h2 style="margin:0 0 28px 0;font-size:19px;font-weight:400;color:#3e362b;letter-spacing:1px;font-family:'Georgia', serif;">Dashboard Overview</h2>

  <div class="dashboard-grid">

    <div class="card">
      <h2>Total Products</h2>
      <p id="totalProducts">0</p>
    </div>

    <div class="card">
      <h2>Total Stock</h2>
      <p id="totalStock">0</p>
    </div>

    <div class="card warning">
      <h2>Low Stock</h2>
      <p id="lowStock">0</p>
    </div>

    <div class="card danger">
      <h2>Out of Stock</h2>
      <p id="outStock">0</p>
    </div>

    <div class="card success">
      <h2>Jualan Hari Ini</h2>
      <p id="todaySales">RM 0.00</p>
    </div>

    <div class="card success">
      <h2>Jumlah Transaksi Hari Ini</h2>
      <p id="todayTransactions">0</p>
    </div>

  </div>

  <div class="panel">
    <h3>Transaksi Terkini</h3>
    <div id="recentTransactions">
      <div class="empty-state">Tiada transaksi lagi.</div>
    </div>
  </div>

</div>

</div>

<!-- ================= JS ================= -->
<script>

/* LOGIN CHECK */
if(localStorage.getItem("loggedIn") !== "true"){
  window.location.href = "login.html";
}

/* SIDEBAR */
function toggleSidebar(){
  const sidebar = document.getElementById("sidebar");
  const overlay = document.getElementById("overlay");
  sidebar.classList.toggle("hide");
  overlay.classList.toggle("show", !sidebar.classList.contains("hide") && window.innerWidth <= 768);
}

function go(page){
  location.href = page + ".html";
}

/* TANDAKAN MENU AKTIF */
function setActiveMenu(){
  const current = (location.pathname.split("/").pop() || "index.html").replace(".html","");
  document.querySelectorAll(".sidebar div").forEach(item=>{
    item.classList.toggle("active", item.dataset.page === current);
  });
}

/* USER */
function loadUser(){
  document.getElementById("user").innerText =
    localStorage.getItem("username") || "User";
}

/* LOGOUT */
function logout(){
  if(confirm("Adakah anda pasti mahu log keluar?")){
    localStorage.removeItem("loggedIn");
    window.location.href = "login.html";
  }
}

/* JAM REAL-TIME */
function updateClock(){
  const now = new Date();
  const options = { weekday:'short', day:'2-digit', month:'short', year:'numeric' };
  const dateStr = now.toLocaleDateString('ms-MY', options);
  const timeStr = now.toLocaleTimeString('ms-MY', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
  document.getElementById("clock").innerText = `${dateStr}, ${timeStr}`;
}

/* DASHBOARD DATA - PRODUK & STOK */
function loadDashboard(){
  let products = [];
  try{
    products = JSON.parse(localStorage.getItem("products")) || [];
  }catch(e){
    console.error("Data produk rosak:", e);
    products = [];
  }

  let totalStock = 0;
  let lowStock = 0;
  let outStock = 0;

  products.forEach(p=>{
    let stock = parseInt(p.stock) || 0;
    totalStock += stock;

    if(stock === 0){
      outStock++;
    } else if(stock < 5){
      lowStock++;
    }
  });

  document.getElementById("totalProducts").innerText = products.length;
  document.getElementById("totalStock").innerText = totalStock;
  document.getElementById("lowStock").innerText = lowStock;
  document.getElementById("outStock").innerText = outStock;
}

/* DASHBOARD DATA - JUALAN & TRANSAKSI */
function loadSalesData(){
  let transactions = [];
  try{
    transactions = JSON.parse(localStorage.getItem("transactions")) || [];
  }catch(e){
    console.error("Data transaksi rosak:", e);
    transactions = [];
  }

  const today = new Date().toDateString();
  const todayTx = transactions.filter(t => new Date(t.date).toDateString() === today);

  const totalSales = todayTx.reduce((sum, t) => sum + (parseFloat(t.total) || 0), 0);

  document.getElementById("todaySales").innerText = "RM " + totalSales.toFixed(2);
  document.getElementById("todayTransactions").innerText = todayTx.length;

  renderRecentTransactions(transactions);
}

/* PAPARKAN TRANSAKSI TERKINI */
function renderRecentTransactions(transactions){
  const container = document.getElementById("recentTransactions");

  if(!transactions.length){
    container.innerHTML = '<div class="empty-state">Tiada transaksi lagi.</div>';
    return;
  }

  const recent = [...transactions]
    .sort((a,b) => new Date(b.date) - new Date(a.date))
    .slice(0, 8);

  let html = `
    <table>
      <thead>
        <tr>
          <th>Tarikh</th>
          <th>No. Resit</th>
          <th>Jumlah Item</th>
          <th>Total</th>
        </tr>
      </thead>
      <tbody>
  `;

  recent.forEach(t=>{
    const dateStr = new Date(t.date).toLocaleString('ms-MY', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });
    html += `
      <tr>
        <td>${dateStr}</td>
        <td>${t.receiptNo || '-'}</td>
        <td>${t.itemCount || (t.items ? t.items.length : '-')}</td>
        <td>RM ${(parseFloat(t.total) || 0).toFixed(2)}</td>
      </tr>
    `;
  });

  html += "</tbody></table>";
  container.innerHTML = html;
}

/* INIT */
window.onload = function(){
  loadUser();
  setActiveMenu();
  loadDashboard();
  loadSalesData();
  updateClock();
  setInterval(updateClock, 1000);
};

window.addEventListener("resize", ()=>{
  if(window.innerWidth > 768){
    document.getElementById("overlay").classList.remove("show");
  }
});

</script>

</body>
</html>
